# Render Blueprint — Wube Bereha (PostgreSQL + Spring Boot API + Next.js frontend)
# https://render.com/docs/blueprint-spec

databases:
  - name: wubebereha-db
    databaseName: wubebereha
    user: wubebereha
    plan: free

services:
  - type: web
    name: wubebereha-api
    runtime: java
    rootDir: backend
    plan: free
    buildCommand: ./mvnw clean verify
    startCommand: java -jar target/wube-bereha-api-0.0.1-SNAPSHOT.jar
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: wubebereha-db
          property: connectionString
      - key: UPLOAD_DIR
        value: /var/data/uploads
      # Set automatically from the frontend service URL. Override with your custom
      # domain after DNS is configured (e.g. https://www.example.com).
      - key: FRONTEND_ALLOWED_ORIGIN
        fromService:
          type: web
          name: wubebereha-frontend
          envVarKey: RENDER_EXTERNAL_URL
    disk:
      name: wubebereha-uploads
      mountPath: /var/data/uploads
      sizeGB: 1

  - type: web
    name: wubebereha-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Wired to the backend's public URL. Override with your API custom domain
      # after DNS is configured (e.g. https://api.example.com).
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          type: web
          name: wubebereha-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_SITE_URL
        fromService:
          type: web
          name: wubebereha-frontend
          envVarKey: RENDER_EXTERNAL_URL
