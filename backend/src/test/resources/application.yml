spring:
  datasource:
    url: jdbc:h2:mem:wubebereha;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

wubebereha:
  jwt-secret: test-secret-key-for-jwt-signing-32b
  upload-dir: ${java.io.tmpdir}/wubebereha-uploads-test
  frontend-allowed-origin: ${FRONTEND_ALLOWED_ORIGIN:http://localhost:3000}
