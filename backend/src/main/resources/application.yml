server:
  port: ${PORT:8080}

spring:
  application:
    name: wube-bereha-habesha-events
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wubebereha}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 15MB

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true

wubebereha:
  jwt-secret: ${JWT_SECRET:change-this-to-a-long-random-secret-key}
  upload-dir: ${UPLOAD_DIR:../public/uploads}
  frontend-allowed-origin: ${FRONTEND_ALLOWED_ORIGIN:http://localhost:3000}
