server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: wube-bereha-habesha-events
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 15MB

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    org.springframework.security: WARN

wubebereha:
  jwt-secret: ${JWT_SECRET:change-this-to-a-long-random-secret-key}
  jwt-expiration-hours: ${JWT_EXPIRATION_HOURS:24}
  upload-dir: ${UPLOAD_DIR:../public/uploads}
  frontend-allowed-origin: ${FRONTEND_ALLOWED_ORIGIN:http://localhost:3000}
