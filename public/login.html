<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Habesha Events USA</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="bg-white border-b border-gray-200">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/" class="text-xl font-bold text-amber-700">🇪🇹 Habesha Events USA</a>
      <a href="/" class="text-sm text-gray-500 hover:text-amber-700">← Back to Events</a>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <div class="bg-white rounded-2xl border border-gray-200 shadow-lg p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-1">Welcome</h1>
        <p class="text-gray-500 text-sm mb-6">Sign in or create an account to post events and view organizer contacts.</p>

        <!-- Tabs -->
        <div class="flex border-b border-gray-200 mb-6">
          <button id="tab-login" class="flex-1 py-2 text-sm font-semibold border-b-2 border-amber-600 text-amber-700">Sign In</button>
          <button id="tab-register" class="flex-1 py-2 text-sm font-semibold border-b-2 border-transparent text-gray-400">Sign Up</button>
        </div>

        <!-- Login form -->
        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email or Phone</label>
            <input id="login-identifier" type="text" placeholder="you@email.com or +1 555-0000" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-amber-500 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input id="login-password" type="password" placeholder="Your password" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-amber-500 outline-none">
          </div>
          <button type="submit" class="w-full bg-amber-600 hover:bg-amber-700 text-white py-2.5 rounded-lg font-semibold transition">
            Sign In
          </button>
        </form>

        <!-- Register form -->
        <form id="register-form" class="space-y-4 hidden">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input id="reg-email" type="email" placeholder="you@email.com"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-amber-500 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Phone (optional)</label>
            <input id="reg-phone" type="tel" placeholder="+1 555-000-0000"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-amber-500 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input id="reg-password" type="password" placeholder="Min. 6 characters" required minlength="6"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-amber-500 outline-none">
          </div>
          <button type="submit" class="w-full bg-amber-600 hover:bg-amber-700 text-white py-2.5 rounded-lg font-semibold transition">
            Create Account
          </button>
        </form>

        <p id="auth-message" class="text-sm mt-4 text-center"></p>
      </div>
    </div>
  </main>

  <footer class="border-t border-gray-200 bg-white mt-auto">
    <div class="max-w-6xl mx-auto px-4 py-6 text-center text-sm text-gray-400">
      <p>&copy; 2026 Habesha Events USA</p>
      <p class="mt-1">Powered by Ermias G</p>
    </div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    const tabLogin = document.getElementById("tab-login");
    const tabRegister = document.getElementById("tab-register");
    const loginForm = document.getElementById("login-form");
    const registerForm = document.getElementById("register-form");
    const message = document.getElementById("auth-message");

    function showTab(tab) {
      const isLogin = tab === "login";
      loginForm.classList.toggle("hidden", !isLogin);
      registerForm.classList.toggle("hidden", isLogin);
      tabLogin.className = isLogin
        ? "flex-1 py-2 text-sm font-semibold border-b-2 border-amber-600 text-amber-700"
        : "flex-1 py-2 text-sm font-semibold border-b-2 border-transparent text-gray-400";
      tabRegister.className = !isLogin
        ? "flex-1 py-2 text-sm font-semibold border-b-2 border-amber-600 text-amber-700"
        : "flex-1 py-2 text-sm font-semibold border-b-2 border-transparent text-gray-400";
      message.textContent = "";
    }

    tabLogin.addEventListener("click", () => showTab("login"));
    tabRegister.addEventListener("click", () => showTab("register"));

    function parseIdentifier(value) {
      return value.includes("@") ? { email: value } : { phone: value };
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      message.className = "text-sm mt-4 text-center text-gray-500";
      message.textContent = "Signing in...";
      try {
        const identifier = document.getElementById("login-identifier").value.trim();
        const data = await api.post("/api/auth/login", {
          ...parseIdentifier(identifier),
          password: document.getElementById("login-password").value,
        });
        auth.saveSession(data.token, data.user);
        window.location.href = data.user.role === "admin" ? "/admin/moderation" : "/";
      } catch (err) {
        message.className = "text-sm mt-4 text-center text-red-600";
        message.textContent = err.message;
      }
    });

    registerForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      message.className = "text-sm mt-4 text-center text-gray-500";
      message.textContent = "Creating account...";
      try {
        const data = await api.post("/api/auth/register", {
          email: document.getElementById("reg-email").value || undefined,
          phone: document.getElementById("reg-phone").value || undefined,
          password: document.getElementById("reg-password").value,
        });
        auth.saveSession(data.token, data.user);
        window.location.href = "/";
      } catch (err) {
        message.className = "text-sm mt-4 text-center text-red-600";
        message.textContent = err.message;
      }
    });

    if (auth.isLoggedIn()) window.location.href = "/";
  </script>
</body>
</html>
